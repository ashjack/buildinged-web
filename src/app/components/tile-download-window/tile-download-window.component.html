<div class="app-tile-download-window"  *ngIf="loading">
    <div class="loading-box">
        <div class="loader"></div>
        <h3 style="margin-top: 10px;">Downloading <b>{{currentPackName || 'tiles'}}</b>...</h3>
        <p *ngIf="currentSheetName">Tileset: {{currentSheetName}}</p>
        <p>{{processedTiles}}/{{totalTiles}}</p>
    </div>
</div>
